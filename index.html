<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Training Log</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #252525; --accent: #4ecdc4; --accent2: #e6a817; --text: #f0f0f0; --dim: #888; --border: #333; --success: #2ecc71; --danger: #e74c3c; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 80px; }
        .header { padding: 20px; text-align: center; border-bottom: 1px solid var(--border); }
        .header h1 { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
        .header .subtitle { font-size: 0.75rem; color: var(--dim); margin-top: 4px; }
        .tabs { display: flex; position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); z-index: 100; }
        .tabs button { flex: 1; padding: 12px 4px; background: none; border: none; color: var(--dim); font-size: 0.65rem; font-weight: 600; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; }
        .tabs button.active { color: var(--accent); }
        .tabs button .icon { font-size: 1.2rem; }
        .panel { display: none; padding: 16px; }
        .panel.active { display: block; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 12px; }
        .card h3 { font-size: 0.85rem; color: var(--accent); margin-bottom: 8px; }
        .exercise-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .exercise-row:last-child { border-bottom: none; }
        .exercise-name { font-size: 0.9rem; font-weight: 600; }
        .exercise-detail { font-size: 0.75rem; color: var(--dim); margin-top: 2px; }
        .exercise-sets { font-size: 0.8rem; color: var(--accent); font-weight: 600; }
        .log-btn { background: var(--accent); color: #000; border: none; padding: 8px 14px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; cursor: pointer; }
        .log-btn:active { transform: scale(0.95); }
        input, select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px 12px; border-radius: 6px; font-size: 0.9rem; width: 100%; margin-bottom: 8px; }
        input:focus, select:focus { outline: none; border-color: var(--accent); }
        .btn { background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 8px; font-size: 0.9rem; font-weight: 700; cursor: pointer; width: 100%; margin-top: 8px; }
        .btn:active { transform: scale(0.97); }
        .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
        .stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        .stat { text-align: center; background: var(--surface2); padding: 14px; border-radius: 8px; }
        .stat .num { font-size: 1.5rem; font-weight: 800; color: var(--accent); }
        .stat .label { font-size: 0.65rem; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
        .goal-bar { background: var(--surface2); border-radius: 8px; height: 8px; margin: 8px 0; overflow: hidden; }
        .goal-fill { height: 100%; background: var(--accent); border-radius: 8px; transition: width 0.3s; }
        .log-entry { background: var(--surface2); border-radius: 6px; padding: 10px 12px; margin-bottom: 6px; display: flex; justify-content: space-between; font-size: 0.8rem; }
        .log-entry .time { color: var(--dim); font-size: 0.7rem; }
        .day-selector { display: flex; gap: 6px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; }
        .day-selector button { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; white-space: nowrap; cursor: pointer; }
        .day-selector button.active { background: var(--accent); color: #000; border-color: var(--accent); }
        canvas { max-height: 200px; margin-top: 12px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Training Log</h1>
        <div class="subtitle">15 lbs by September - Let's go</div>
    </div>

    <div class="panel active" id="panel-workout">
        <div class="day-selector" id="day-selector"></div>
        <div id="workout-list"></div>
    </div>

    <div class="panel" id="panel-log">
        <div class="card">
            <h3>Log Exercise</h3>
            <select id="log-exercise"><option value="">Select exercise...</option></select>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
                <input type="number" id="log-sets" placeholder="Sets">
                <input type="text" id="log-reps" placeholder="Reps">
                <input type="number" id="log-weight" placeholder="Lbs">
            </div>
            <input type="text" id="log-notes" placeholder="Notes (optional)">
            <button class="btn" onclick="saveWorkoutLog()">Log It</button>
        </div>
        <div class="card">
            <h3>Today's Logs</h3>
            <div id="today-logs"></div>
        </div>
    </div>

    <div class="panel" id="panel-body">
        <div class="card">
            <h3>Log Weight</h3>
            <input type="number" step="0.1" id="body-weight" placeholder="Weight (lbs)">
            <input type="text" id="body-notes" placeholder="Notes (optional)">
            <button class="btn" onclick="saveBodyLog()">Save</button>
        </div>
        <div class="card">
            <h3>Progress</h3>
            <div id="weight-goal"></div>
            <canvas id="weight-chart"></canvas>
        </div>
    </div>

    <div class="panel" id="panel-food">
        <div class="card">
            <h3>Log Meal</h3>
            <select id="food-meal">
                <option value="breakfast">Breakfast</option>
                <option value="lunch">Lunch</option>
                <option value="dinner">Dinner</option>
                <option value="snack">Snack</option>
            </select>
            <input type="text" id="food-desc" placeholder="What did you eat?">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
                <input type="number" id="food-cals" placeholder="Calories (est)">
                <input type="number" id="food-protein" placeholder="Protein (g)">
            </div>
            <button class="btn" onclick="saveFoodLog()">Log Meal</button>
        </div>
        <div class="card">
            <h3>Today's Meals</h3>
            <div id="today-food"></div>
        </div>
    </div>

    <div class="panel" id="panel-stats">
        <div class="stat-row">
            <div class="stat"><div class="num" id="s-workouts">0</div><div class="label">Workouts (7d)</div></div>
            <div class="stat"><div class="num" id="s-streak">0</div><div class="label">Day Streak</div></div>
        </div>
        <div class="stat-row">
            <div class="stat"><div class="num" id="s-weight">--</div><div class="label">Current Lbs</div></div>
            <div class="stat"><div class="num" id="s-lost">--</div><div class="label">Lbs Lost</div></div>
        </div>
        <div class="card">
            <h3>Weight Over Time</h3>
            <canvas id="stats-chart"></canvas>
        </div>
        <div class="card">
            <h3>Recent Workouts</h3>
            <div id="recent-workouts"></div>
        </div>
    </div>

    <div class="tabs">
        <button class="active" data-panel="workout"><span class="icon">💪</span>Workout</button>
        <button data-panel="log"><span class="icon">📝</span>Log</button>
        <button data-panel="body"><span class="icon">⚖️</span>Weight</button>
        <button data-panel="food"><span class="icon">🍽️</span>Food</button>
        <button data-panel="stats"><span class="icon">📊</span>Stats</button>
    </div>

<script>
const SUPABASE_URL = 'https://fokpdeenvnulmbthyjph.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZva3BkZWVudm51bG1idGh5anBoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMTE2ODUsImV4cCI6MjA5NzY4NzY4NX0.G1YYPlAy3s4dKcgKvdplrsukZOqXiJZgS_ePI8NeBfg';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const START_WEIGHT = null; // Will be set from first log
const GOAL_WEIGHT_LOSS = 15;
const GOAL_DATE = '2026-09-01';

let workoutPlan = [];
let selectedDay = 1;

async function init() {
    // Load workout plan
    const { data } = await db.from('workout_plans').select('*').order('day_number').order('sort_order');
    workoutPlan = data || [];

    // Build day selector
    const days = [...new Set(workoutPlan.map(w => w.day_name))];
    const selector = document.getElementById('day-selector');
    days.forEach((day, i) => {
        selector.innerHTML += `<button ${i===0?'class="active"':''} onclick="selectDay(${i+1},'${day}',this)">${day}</button>`;
    });

    // Populate exercise dropdown
    const select = document.getElementById('log-exercise');
    const exercises = [...new Set(workoutPlan.map(w => w.exercise_name))];
    exercises.forEach(e => { select.innerHTML += `<option value="${e}">${e}</option>`; });

    selectDay(1, days[0]);
    loadTodayLogs();
    loadTodayFood();
    loadStats();
    setupTabs();
}

function setupTabs() {
    document.querySelectorAll('.tabs button').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('panel-' + btn.dataset.panel).classList.add('active');
            if (btn.dataset.panel === 'stats') loadStats();
            if (btn.dataset.panel === 'body') loadWeightChart();
        });
    });
}

function selectDay(num, name, btn) {
    selectedDay = num;
    document.querySelectorAll('.day-selector button').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    const exercises = workoutPlan.filter(w => w.day_number === num);
    document.getElementById('workout-list').innerHTML = exercises.map(e => `
        <div class="exercise-row">
            <div>
                <div class="exercise-name">${e.exercise_name}</div>
                <div class="exercise-detail">${e.notes || ''}</div>
            </div>
            <div style="text-align:right;">
                <div class="exercise-sets">${e.sets} x ${e.reps}</div>
            </div>
        </div>
    `).join('');
}

async function saveWorkoutLog() {
    const exercise = document.getElementById('log-exercise').value;
    const sets = document.getElementById('log-sets').value;
    const reps = document.getElementById('log-reps').value;
    const weight = document.getElementById('log-weight').value;
    const notes = document.getElementById('log-notes').value;
    if (!exercise) return;

    await db.from('workout_logs').insert({ exercise_name: exercise, sets_completed: sets || null, reps_completed: reps || null, weight_lbs: weight || null, notes: notes || null });

    document.getElementById('log-sets').value = '';
    document.getElementById('log-reps').value = '';
    document.getElementById('log-weight').value = '';
    document.getElementById('log-notes').value = '';
    loadTodayLogs();
}

async function loadTodayLogs() {
    const today = new Date().toISOString().slice(0, 10);
    const { data } = await db.from('workout_logs').select('*').gte('logged_at', today + 'T00:00:00').order('logged_at', { ascending: false });
    const container = document.getElementById('today-logs');
    if (!data || data.length === 0) { container.innerHTML = '<p style="color:var(--dim);font-size:0.8rem;">No exercises logged today yet.</p>'; return; }
    container.innerHTML = data.map(l => `<div class="log-entry"><span>${l.exercise_name} ${l.weight_lbs?l.weight_lbs+'lbs':''} ${l.sets_completed||''}x${l.reps_completed||''}</span><span class="time">${new Date(l.logged_at).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</span></div>`).join('');
}

async function saveBodyLog() {
    const weight = document.getElementById('body-weight').value;
    const notes = document.getElementById('body-notes').value;
    if (!weight) return;
    await db.from('body_logs').insert({ weight_lbs: weight, notes: notes || null });
    document.getElementById('body-weight').value = '';
    document.getElementById('body-notes').value = '';
    loadWeightChart();
}

async function loadWeightChart() {
    const { data } = await db.from('body_logs').select('*').order('logged_at');
    if (!data || data.length === 0) { document.getElementById('weight-goal').innerHTML = '<p style="color:var(--dim);font-size:0.8rem;">Log your first weigh-in to see progress.</p>'; return; }

    const first = data[0].weight_lbs;
    const current = data[data.length - 1].weight_lbs;
    const lost = first - current;
    const pct = Math.min(100, (lost / GOAL_WEIGHT_LOSS) * 100);
    const target = first - GOAL_WEIGHT_LOSS;

    document.getElementById('weight-goal').innerHTML = `
        <div style="display:flex;justify-content:space-between;font-size:0.8rem;color:var(--dim);"><span>Start: ${first} lbs</span><span>Goal: ${target} lbs</span></div>
        <div class="goal-bar"><div class="goal-fill" style="width:${pct}%"></div></div>
        <div style="text-align:center;font-size:0.75rem;color:var(--accent);">${lost.toFixed(1)} lbs lost of ${GOAL_WEIGHT_LOSS} goal (${pct.toFixed(0)}%)</div>
    `;

    const ctx = document.getElementById('weight-chart');
    if (window.weightChartInstance) window.weightChartInstance.destroy();
    window.weightChartInstance = new Chart(ctx, {
        type: 'line',
        data: { labels: data.map(d => d.logged_at), datasets: [{ label: 'Weight', data: data.map(d => d.weight_lbs), borderColor: '#4ecdc4', backgroundColor: 'rgba(78,205,196,0.1)', fill: true, tension: 0.3 }] },
        options: { responsive: true, plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#888', maxTicksLimit: 7 }, grid: { display: false } }, y: { ticks: { color: '#888' }, grid: { color: '#333' } } } }
    });
}

async function saveFoodLog() {
    const meal = document.getElementById('food-meal').value;
    const desc = document.getElementById('food-desc').value;
    const cals = document.getElementById('food-cals').value;
    const protein = document.getElementById('food-protein').value;
    if (!desc) return;
    await db.from('food_logs').insert({ meal, description: desc, calories: cals || null, protein_g: protein || null });
    document.getElementById('food-desc').value = '';
    document.getElementById('food-cals').value = '';
    document.getElementById('food-protein').value = '';
    loadTodayFood();
}

async function loadTodayFood() {
    const today = new Date().toISOString().slice(0, 10);
    const { data } = await db.from('food_logs').select('*').gte('logged_at', today + 'T00:00:00').order('logged_at');
    const container = document.getElementById('today-food');
    if (!data || data.length === 0) { container.innerHTML = '<p style="color:var(--dim);font-size:0.8rem;">No meals logged today.</p>'; return; }
    const totalCals = data.reduce((s, m) => s + (m.calories || 0), 0);
    const totalProtein = data.reduce((s, m) => s + (m.protein_g || 0), 0);
    container.innerHTML = data.map(m => `<div class="log-entry"><span>${m.meal}: ${m.description}</span><span>${m.calories?m.calories+'cal':''} ${m.protein_g?m.protein_g+'g':''}</span></div>`).join('') +
        `<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:0.8rem;display:flex;justify-content:space-between;"><span style="color:var(--accent);font-weight:700;">Total</span><span>${totalCals} cal / ${totalProtein}g protein</span></div>`;
}

async function loadStats() {
    // Workouts in last 7 days
    const week = new Date(Date.now() - 7*24*60*60*1000).toISOString();
    const { data: logs } = await db.from('workout_logs').select('logged_at').gte('logged_at', week);
    const uniqueDays = new Set((logs||[]).map(l => l.logged_at.slice(0,10)));
    document.getElementById('s-workouts').textContent = uniqueDays.size;

    // Streak (consecutive days with logs)
    const { data: allLogs } = await db.from('workout_logs').select('logged_at').order('logged_at', { ascending: false });
    let streak = 0;
    if (allLogs && allLogs.length > 0) {
        let checkDate = new Date(); checkDate.setHours(0,0,0,0);
        const logDates = new Set(allLogs.map(l => l.logged_at.slice(0,10)));
        while (logDates.has(checkDate.toISOString().slice(0,10))) { streak++; checkDate.setDate(checkDate.getDate()-1); }
    }
    document.getElementById('s-streak').textContent = streak;

    // Weight
    const { data: bodyData } = await db.from('body_logs').select('*').order('logged_at', { ascending: false }).limit(1);
    if (bodyData && bodyData.length > 0) {
        document.getElementById('s-weight').textContent = bodyData[0].weight_lbs;
        const { data: firstLog } = await db.from('body_logs').select('weight_lbs').order('logged_at').limit(1);
        if (firstLog && firstLog.length > 0) {
            const lost = firstLog[0].weight_lbs - bodyData[0].weight_lbs;
            document.getElementById('s-lost').textContent = lost.toFixed(1);
        }
    }

    // Recent workouts
    const { data: recent } = await db.from('workout_logs').select('*').order('logged_at', { ascending: false }).limit(10);
    document.getElementById('recent-workouts').innerHTML = (recent||[]).map(l => `<div class="log-entry"><span>${l.exercise_name} ${l.weight_lbs?l.weight_lbs+'lbs':''} ${l.sets_completed||''}x${l.reps_completed||''}</span><span class="time">${new Date(l.logged_at).toLocaleDateString()}</span></div>`).join('') || '<p style="color:var(--dim);font-size:0.8rem;">No workouts yet.</p>';

    // Stats chart
    const { data: allBody } = await db.from('body_logs').select('*').order('logged_at');
    if (allBody && allBody.length > 1) {
        const ctx = document.getElementById('stats-chart');
        if (window.statsChartInstance) window.statsChartInstance.destroy();
        window.statsChartInstance = new Chart(ctx, {
            type: 'line',
            data: { labels: allBody.map(d => d.logged_at), datasets: [{ label: 'Weight', data: allBody.map(d => d.weight_lbs), borderColor: '#4ecdc4', tension: 0.3, fill: true, backgroundColor: 'rgba(78,205,196,0.1)' }] },
            options: { responsive: true, plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#888', maxTicksLimit: 7 }, grid: { display: false } }, y: { ticks: { color: '#888' }, grid: { color: '#333' } } } }
        });
    }
}

init();
</script>
</body>
</html>
